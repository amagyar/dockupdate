version: 2

project_name: dockupdate

builds:
  - id: dockupdate
    main: ./cmd/dockupdate
    binary: dockupdate
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: dockupdate
    # tar.gz everywhere (including windows) so the npm installer needs only tar.
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

# Keyless cosign signing (Sigstore OIDC via the GitHub Actions token):
# uploads <artifact>.sig and <artifact>.pem for every artifact, including
# checksums.txt. Requires the sigstore/cosign-installer step and
# id-token: write in the release workflow.
signs:
  - cmd: cosign
    signature: "${artifact}.sig"
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - -y
      - --output-certificate
      - "${certificate}"
      - --output-signature
      - "${signature}"
      - "${artifact}"
    artifacts: all
    output: true

homebrew_casks:
  - name: dockupdate
    repository:
      owner: amagyar
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/amagyar/dockupdate
    description: "Terminal UI to manage Docker/Podman containers and their updates"
    license: MIT
    url:
      verified: github.com/amagyar/dockupdate
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/dockupdate"]
          end

release:
  github:
    owner: amagyar
    name: dockupdate

changelog:
  groups:
    - title: Features
      regexp: '^.*?(feat|perf)(\(\w+\))?!?:.+'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\(\w+\))?!?:.+'
      order: 1
    - title: Others
      order: 999
  filters:
    exclude:
      - '^docs'
      - '^chore'
      - '^test'
      - '^ci'
      - '^style'
      - '^refactor'
      - '^build'

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"
